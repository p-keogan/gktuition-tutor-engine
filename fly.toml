# Fly.io app config — GKTuition AI Tutor (FastAPI + cost firewall).
#
# Phase 1.5-3 deployment target per ADR-003. The AWS Lambda migration is
# deferred to a future ADR (ADR-005) and is gated on >1,000 daily queries.
# Until that trigger fires, Fly.io carries the orchestrator.
#
# Region: fra (Frankfurt) — closest Fly region to Ireland, lowest p50 latency
# for student traffic on gktuition.ie. Re-evaluate once we have real RUM.
#
# Sizing: one shared-cpu-1x machine, 256MB RAM, scale-to-zero. The orchestrator
# is mostly I/O (Snowflake + Anthropic), CPU is rarely the bottleneck. 256MB
# is comfortable headroom for FastAPI + the Snowflake connector + connection
# pool; if we see OOM kills, the first step is to bump to 512MB before
# reaching for bigger CPUs.
#
# Secrets: declared by name only. Run `scripts/setup_fly_secrets.sh` from a
# local checkout to populate them; the agent never writes secrets here.

app = "gktuition-tutor-api"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "10s"

# -----------------------------------------------------------------------------
# Processes — two long-running roles driven from the same image.
#
#   * app   — uvicorn serving FastAPI on :8000. Reached by http_service.
#   * warm  — keeps the full /query path JIT-hot (synthesiser + Snowflake
#             warehouse + L3 cache) during expected-active hours (15:00–22:00
#             IE, Mon–Sun). Pings /query every ~40s in-window, no-ops
#             out-of-window. See scripts/always_warm.py for the rationale and
#             cost model (~€1.30–2.00/month additional spend for guaranteed
#             sub-5s response in-window). The Fly /healthz probe alone keeps
#             Snowflake from auto-suspending but doesn't exercise the
#             synthesiser path — DAY_30 saw a 205s cold-start there even with
#             the warehouse warm.
#
# Alternative: comment out the [processes] block and run the warmup on a
# Fly Machines cron instead (1-minute resolution instead of 40s):
#
#     flyctl m run --schedule '* 15-22 * * *' \
#         --app gktuition-tutor-api \
#         --image registry.fly.io/gktuition-tutor-api:latest \
#         python /app/scripts/always_warm.py
#
# The script self-gates to the warm window in both modes, so a cron with
# a wider schedule is harmless.
# -----------------------------------------------------------------------------
[processes]
  app  = "sh -c 'exec uvicorn api.main:app --host 0.0.0.0 --port ${PORT}'"
  warm = "python /app/scripts/always_warm.py --loop"

# -----------------------------------------------------------------------------
# Build — produce the image from our multi-stage Dockerfile. GitHub Actions
# also drives this with `flyctl deploy`, which respects this section.
# -----------------------------------------------------------------------------
[build]
  dockerfile = "Dockerfile"
  # GIT_SHA is wired through from CI via --build-arg so /healthz reports the
  # commit that's actually running.
  [build.args]
    GIT_SHA = "unknown"

# -----------------------------------------------------------------------------
# App env — non-secret defaults. Secrets live in `fly secrets`.
# -----------------------------------------------------------------------------
[env]
  PORT = "8000"
  GKTUITION_ENV = "prod"

  # Firewall layers — every layer toggled ON in production. Tuning happens
  # via secrets or via `fly machines update` for short-lived experiments.
  TURNSTILE_ENABLED = "true"
  RATE_LIMIT_ENABLED = "true"
  SEMANTIC_CACHE_ENABLED = "true"
  CIRCUIT_BREAKER_ENABLED = "true"
  KILL_SWITCH_ENABLED = "true"
  LANGFUSE_ENABLED = "true"

  # Observability — point the Snowflake log sink at the right table. The
  # sink itself is wired in api/observability/snowflake_log_sink.py.
  SNOWFLAKE_LOG_SINK_ENABLED = "true"
  SNOWFLAKE_LOG_SINK_TABLE = "GKTUITION_TUTOR.RAW.QUERY_LOG"
  SNOWFLAKE_LOG_SINK_FLUSH_INTERVAL_S = "30"
  SNOWFLAKE_LOG_SINK_FLUSH_SIZE = "100"

  # Voice anchoring (Phase 2, AGENT_15) — root of the sibling
  # `career-transition-2026` corpus from which the synthesiser reads the
  # strand cram summaries and `_voice.md` for prompt prefixing. On Fly
  # this resolves to the in-image location the Dockerfile populates with
  # `tutorials/_voice.md` + `tutorials/LCHL_*/_SUMMARY-exam-cram.md`. If
  # the path doesn't exist at runtime the synthesiser falls back to the
  # bare SYSTEM_PROMPT (degraded but valid) — see voice_anchor.py.
  CORPUS_ROOT = "/app/corpus"

# -----------------------------------------------------------------------------
# HTTP service — one TCP port, two health probes (an HTTP probe at /healthz
# every 10s + a TCP probe so Fly knows the machine accepted a connection).
# -----------------------------------------------------------------------------
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # cold-start ok per ADR-003 cost profile
  auto_start_machines = true
  min_machines_running = 0        # scale-to-zero saves money during quiet hours
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "10s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"
    protocol = "http"
    tls_skip_verify = false

# -----------------------------------------------------------------------------
# Machine specs — per-process VM sizing.
#
# Both processes run on the smallest shared-cpu-1x footprint (256MB is Fly's
# minimum for shared-cpu-1x). The warm worker's actual usage is < 50MB
# resident; we accept the 256MB minimum as overhead. Fly's free allowance
# (3x shared-cpu-1x) covers both machines at $0 — outside the free
# allowance, ~$2/month for the second machine, in line with the
# €1.30–2.00/month cost-model documented in scripts/always_warm.py.
# -----------------------------------------------------------------------------
[[vm]]
  processes = ["app"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ["warm"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# -----------------------------------------------------------------------------
# Secrets declaration — these are referenced by name only. Setting them is
# done with `fly secrets set` (see scripts/setup_fly_secrets.sh). Listing
# them here is informational; Fly does not enforce that they exist before
# deploy but the app will fail to boot if they don't.
#
# Required at boot:
#   SF_ACCOUNT, SF_USER, SF_WAREHOUSE, SF_DATABASE
#   SF_PRIVATE_KEY  (base64-encoded RSA key — see runbook)
#   ANTHROPIC_API_KEY
#   WP_JWT_SECRET
#
# Optional (firewall + observability):
#   TURNSTILE_SECRET_KEY
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
# -----------------------------------------------------------------------------

[deploy]
  # Rolling strategy means the old machine keeps serving until the new one
  # passes /healthz. For min_machines_running=0 this still works — Fly spins
  # up the new machine, waits for green, then retires the old.
  strategy = "rolling"
  # Hard ceiling on a single deploy; if the new machine never reports
  # healthy within this window, `flyctl deploy` exits non-zero and CI rolls
  # back via `flyctl deploy --rollback`.
  wait_timeout = "5m"

[metrics]
  port = 9091
  path = "/metrics"
