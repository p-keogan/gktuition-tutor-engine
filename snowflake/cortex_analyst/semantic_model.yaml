          - "confidence interval"
          - "hypothesis test"
          - "hypothesis testing"
          - "CLT"
          - "central limit theorem"
          - "margin of error"
          - "empirical rule"
          # ── Paper 2 strands (Trigonometry) ────────────────────────────
          - "trigonometry"
          - "trig"
          - "trigonometry 1"
          - "trig 1"
          - "trigonometry 2"
          - "trig 2"
          - "trigonometry 3"
          - "trig 3"
          - "trigonometry 4"
          - "trig 4"
          - "sine rule"
          - "cosine rule"
          - "pythagoras"
          - "sohcahtoa"
          - "unit circle"
          - "compound angle"
          - "trig identities"
          - "sector"
          - "arc length"
          - "non-right-angled triangle"
          # ── Paper 2 strands (The Line) ────────────────────────────────
          - "the line"
          - "coordinate geometry"
          - "coordinate geometry of the line"
          - "perpendicular distance"
          - "slope"
          - "section formula"
          - "line equation"
          - "page-18 formula"
          # ── Paper 2 strands (The Circle) ──────────────────────────────
          - "the circle"
          - "circle equation"
          - "tangent to a circle"
          - "centre and radius"
          - "two circles"
          - "internal tangency"
          - "external tangency"
          # ── Paper 2 strands (Geometry 1) ──────────────────────────────
          - "geometry"
          - "geometry 1"
          - "similar triangles"
          - "congruent triangles"
          - "prescribed theorems"
          - "theorem 11"
          - "theorem 12"
          - "theorem 13"
          - "theorem 16"
          - "theorem 17"
          - "Maths Set Constructions"
          - "constructions"
          # ── Paper 2 strands (AVM 1) ───────────────────────────────────
          - "AVM"
          - "AVM 1"
          - "area volume measurement"
          - "area volume and measurement"
          - "area, volume and measurement"
          - "cone"
          - "cylinder"
          - "sphere"
          - "volume"
          - "trapezoidal rule"
          - "cone formulas"
