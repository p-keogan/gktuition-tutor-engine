      - name: topic_raw
        synonyms:
          - "free-form topic"
          - "topic description"
          - "topic label"
          - "topic line"
        description: |
          Free-form per-part topic string from the source `**Topic:**` line.
          Use for substring matching when topic_strand isn't granular enough
          (e.g. WHERE topic_raw ILIKE '%nature of roots%').
        expr: topic_raw
        data_type: VARCHAR

      - name: paper_strand_key
        synonyms:
          - "paper strand combo"
          - "paper and strand"
        description: "Composite key 'paper:strand', e.g. '1:differentiation', '2:probability'."
        expr: paper_strand_key
        data_type: VARCHAR

      - name: is_load_bearing
        synonyms:
          - "load bearing"
          - "load-bearing"
          - "marked as load-bearing"
          - "key technique"
          - "flagged as critical"
        description: |
          TRUE when the per-part commentary contains the literal phrase
          "load-bearing", matching the LCHL_exam_trends.md methodology.
        expr: is_load_bearing
        data_type: BOOLEAN

      - name: has_proof_request
        synonyms:
          - "proof question"
          - "asks for a proof"
          - "prove that"
          - "show that"
          - "verify"
          - "prescribed proof"
        description: |
          TRUE when the question_text starts with "Prove" / "Show that" / "verify"
          — i.e. asks the student to produce a proof rather than a numerical answer.
        expr: has_proof_request
        data_type: BOOLEAN

      - name: is_recent
        synonyms:
          - "recent"
          - "new format"
          - "post-2021"
          - "since 2021"
          - "modern format"
          - "after format shift"
        description: |
          TRUE when year >= 2021 — i.e. the part is from a paper on the
          post-SEC-reform format (~45 parts per paper rather than ~35).
        expr: is_recent
        data_type: BOOLEAN

      - name: source_path
        description: "Absolute path of the source `_solutions.md` file. Provenance only."
        expr: source_path
        data_type: VARCHAR

    # ─── Time dimensions ─────────────────────────────────────────────────
    time_dimensions:
      - name: year
        synonyms:
          - "exam year"
          - "year of sitting"
          - "year"
          - "calendar year"
          - "sitting year"
        description: "Exam year. 2015–2025 inclusive."
        expr: year
        data_type: NUMBER

    # ─── Measures ────────────────────────────────────────────────────────
    measures:
      - name: parts_count
        synonyms:
          - "question count"
          - "number of parts"
          - "frequency"
          - "how many parts"
          - "how often"
          - "occurrences"
          - "count of parts"
        description: "Count of question-parts. Use for frequency questions."
        expr: COUNT(*)
        data_type: NUMBER
        default_aggregation: sum

      - name: total_marks
        synonyms:
          - "marks awarded"
          - "total marks"
          - "sum of marks"
          - "mark sum"
          - "aggregate marks"
        description: "Sum of marks across the parts in scope."
        expr: SUM(marks)
        data_type: NUMBER
        default_aggregation: sum

      - name: avg_marks_per_part
        synonyms:
          - "average marks"
          - "mean marks"
          - "marks per part"
          - "typical part marks"
          - "average mark allocation"
        description: "Mean marks per part."
        expr: AVG(marks)
        data_type: NUMBER
        default_aggregation: avg

      - name: avg_tutorials_per_part
        synonyms:
          - "average tutorials per part"
          - "tutorial citations per part"
          - "mean tutorial citations"
        description: "Mean number of tutorials cited per part."
        expr: AVG(tutorial_count)
        data_type: NUMBER
        default_aggregation: avg

      - name: distinct_parts
        synonyms:
          - "distinct parts"
          - "unique parts"
        description: "COUNT(DISTINCT part_id). Use when joining tables would otherwise double-count."
        expr: COUNT(DISTINCT part_id)
        data_type: NUMBER

      - name: load_bearing_parts
        synonyms:
          - "load-bearing parts"
          - "key-technique parts"
        description: "Count of parts where is_load_bearing = TRUE."
        expr: COUNT_IF(is_load_bearing)
        data_type: NUMBER

      - name: proof_parts
        synonyms:
          - "proof questions"
          - "parts that ask for a proof"
        description: "Count of parts where has_proof_request = TRUE."
        expr: COUNT_IF(has_proof_request)
        data_type: NUMBER

  # =========================================================================
  # TABLE 2 — exam_parts_by_tutorial (one row per part × tutorial slug)
  # =========================================================================
  - name: exam_parts_by_tutorial
    description: |
      One row per (exam part × cited tutorial slug). Backs tutorial-citation
      frequency queries. Independent of `exam_parts` — the semantic model
      declares no `relationships:` block so Cortex Analyst will choose
      whichever table is the right grain for the question.
    base_table:
      database: GKTUITION_TUTOR
      schema: CORTEX
      table: EXAM_PARTS_BY_TUTORIAL

    dimensions:

      - name: part_id
        synonyms: ["question-part id", "part identifier"]
        description: "Foreign-key-like reference to exam_parts.part_id (but no relationship declared)."
        expr: part_id
        data_type: VARCHAR

      - name: tutorial_slug
        synonyms:
          - "tutorial"
          - "tutorial reference"
          - "cited tutorial"
          - "video slug"
          - "the-line-5"
          - "indices-logs-5"
          - "differentiation-15"
          - "complex-numbers-10"
          - "probability-3"
          - "algebra-2"
          - "tutorial id"
          - "tutorial name"
        description: |
          Kebab-case tutorial slug, e.g. 'indices-logs-5-unknown-in-power-natural-log',
          'differentiation-15-turning-points-max-min', 'the-line-5-perpendicular-distance-from-a-point-to-a-line'.
        expr: tutorial_slug
        data_type: VARCHAR

      - name: tutorial_strand
        synonyms:
          - "tutorial's strand"
          - "strand of cited tutorial"
          - "tutorial category"
        description: "Strand parsed from the slug prefix. Same value set as exam_parts.topic_strand."
        expr: tutorial_strand
        data_type: VARCHAR

      - name: paper
        synonyms: ["paper", "Paper 1", "Paper 2", "P1", "P2"]
        description: "Paper number 1 or 2."
        expr: paper
        data_type: NUMBER

      - name: sitting
        synonyms: ["main sitting", "deferred sitting", "DF", "df"]
        description: "'main' or 'df'."
        expr: sitting
        data_type: VARCHAR

      - name: section
        synonyms: ["Section A", "Section B"]
        description: "'A' or 'B'."
        expr: section
        data_type: VARCHAR

      - name: question_number
        synonyms: ["question number", "Q number"]
        description: "Question number 1–10."
        expr: question_number
        data_type: NUMBER

      - name: sub_part
        synonyms: ["sub-part", "subpart"]
        description: "Sub-part letter / roman path."
        expr: sub_part
        data_type: VARCHAR

      - name: topic_raw
        synonyms: ["topic line", "free-form topic"]
        description: "Verbatim topic string of the part this citation comes from."
        expr: topic_raw
        data_type: VARCHAR

    time_dimensions:
      - name: year
        synonyms: ["year", "exam year", "year of sitting"]
        description: "Year of the part that cites this tutorial."
        expr: year
        data_type: NUMBER

    measures:
      - name: citation_count
        synonyms:
          - "citation count"
          - "times cited"
          - "how often cited"
          - "tutorial citations"
          - "appearance count"
        description: "Count of (part, tutorial) citations."
        expr: COUNT(*)
        data_type: NUMBER
        default_aggregation: sum

      - name: distinct_parts_citing
        synonyms:
          - "distinct parts citing"
          - "unique parts referencing"
        description: "COUNT(DISTINCT part_id) — distinct parts that cite the slug(s) in scope."
        expr: COUNT(DISTINCT part_id)
        data_type: NUMBER

      - name: total_marks_at_stake
        synonyms:
          - "marks at stake"
          - "total marks of citing parts"
          - "marks weighted by citation"
        description: "SUM(marks) across parts that cite the slug(s) in scope."
        expr: SUM(marks)
        data_type: NUMBER
        default_aggregation: sum


# ============================================================================
# Verified queries — the 10 canonical analytical questions a student or Paul
# might ask. Each query teaches Cortex Analyst a high-precision SQL pattern.
# When the natural-language question hits, the model should reproduce the
# pattern; if it diverges, the synonym list above probably needs a tweak.
# ============================================================================
verified_queries:

  - name: integration_by_parts_p1_last_5y
    question: "How often has integration by parts appeared on Paper 1 in the last five years?"
    sql: |
      SELECT COUNT(*) AS parts_count
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE topic_strand = 'integration'
        AND paper = 1
        AND sitting = 'main'
        AND year BETWEEN 2021 AND 2025
        AND (
              topic_raw     ILIKE '%integration by parts%'
           OR solution_text ILIKE '%integration by parts%'
        );

  - name: discriminant_questions_p1_by_year
    question: "How many discriminant questions appear on Paper 1 each year?"
    sql: |
      SELECT year,
             COUNT(*) AS parts_count
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE paper = 1
        AND sitting = 'main'
        AND (
              topic_raw ILIKE '%discriminant%'
           OR topic_raw ILIKE '%nature of roots%'
           OR topic_raw ILIKE '%nature of the roots%'
        )
      GROUP BY year
      ORDER BY year;

  - name: differentiation_trend_p1
    question: "What's the year-over-year trend of differentiation parts on Paper 1?"
    sql: |
      SELECT year,
             COUNT(*) AS parts_count
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE topic_strand = 'differentiation'
        AND paper = 1
        AND sitting = 'main'
      GROUP BY year
      ORDER BY year;

  - name: strand_growth_since_2020_p2
    question: "Which Paper 2 strands have grown since 2020?"
    sql: |
      WITH recent AS (
          SELECT topic_strand, COUNT(*) AS recent_parts
          FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
          WHERE paper = 2 AND sitting = 'main' AND year BETWEEN 2020 AND 2025
          GROUP BY topic_strand
      ),
      prior AS (
          SELECT topic_strand, COUNT(*) AS prior_parts
          FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
          WHERE paper = 2 AND sitting = 'main' AND year BETWEEN 2015 AND 2019
          GROUP BY topic_strand
      )
      SELECT COALESCE(r.topic_strand, p.topic_strand) AS topic_strand,
             COALESCE(p.prior_parts, 0)              AS prior_2015_2019,
             COALESCE(r.recent_parts, 0)             AS recent_2020_2025,
             COALESCE(r.recent_parts, 0)
                - COALESCE(p.prior_parts, 0)          AS delta
      FROM recent r
      FULL OUTER JOIN prior p USING (topic_strand)
      ORDER BY delta DESC;

  - name: avg_marks_nature_of_roots
    question: "What's the average mark allocation for a 'nature of roots' question?"
    sql: |
      SELECT AVG(marks) AS avg_marks_per_part,
             COUNT(*)   AS parts_count
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE topic_raw ILIKE '%nature of%root%'
         OR topic_raw ILIKE '%discriminant%';

  - name: most_cited_tutorial_p1_all_years
    question: "Which single tutorial is cited most often on Paper 1 across all years?"
    sql: |
      SELECT tutorial_slug,
             COUNT(*) AS citation_count
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_BY_TUTORIAL
      WHERE paper = 1
        AND sitting = 'main'
      GROUP BY tutorial_slug
      ORDER BY citation_count DESC
      LIMIT 10;

  - name: deferred_vs_main_strand_mix
    question: "How does the strand mix differ between main and deferred sittings on Paper 2?"
    sql: |
      SELECT topic_strand,
             COUNT_IF(sitting = 'main') AS main_parts,
             COUNT_IF(sitting = 'df')   AS deferred_parts
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE paper = 2
      GROUP BY topic_strand
      ORDER BY main_parts DESC;

  - name: p1_vs_p2_part_count_per_year
    question: "How does the Paper 1 vs Paper 2 part count compare year by year?"
    sql: |
      SELECT year,
             COUNT_IF(paper = 1) AS paper_1_parts,
             COUNT_IF(paper = 2) AS paper_2_parts
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE sitting = 'main'
      GROUP BY year
      ORDER BY year;

  - name: ten_year_average_parts_per_strand_p1
    question: "What's the 10-year average number of parts per strand on Paper 1?"
    sql: |
      SELECT topic_strand,
             COUNT(*)                                AS total_parts,
             COUNT(DISTINCT year)                    AS years_appeared,
             ROUND(COUNT(*) * 1.0
                   / COUNT(DISTINCT year), 1)        AS avg_parts_per_year_appeared
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE paper = 1
        AND sitting = 'main'
        AND year BETWEEN 2015 AND 2025
      GROUP BY topic_strand
      ORDER BY total_parts DESC;

  - name: differentiation_p1_since_2020_heavy
    question: "How many differentiation parts on Paper 1 since 2020 are worth 10 marks or more?"
    sql: |
      SELECT year,
             COUNT(*) AS heavy_diff_parts
      FROM GKTUITION_TUTOR.CORTEX.EXAM_PARTS_FLAT
      WHERE topic_strand = 'differentiation'
        AND paper = 1
        AND sitting = 'main'
        AND year >= 2020
        AND marks >= 10
      GROUP BY year
      ORDER BY year;
