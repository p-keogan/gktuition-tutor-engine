          - "logarithms"
          - "indices and logs"
          - "natural log"
          - "ln"
          - "exponential"
          - "exponential equation"
          - "log equation"
          - "change of base"
          - "rules of logs"
          # ── Paper 1 strands (Complex Numbers) ─────────────────────────
          - "complex numbers"
