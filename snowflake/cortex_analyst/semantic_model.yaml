# ============================================================================
# semantic_model.yaml
# ----------------------------------------------------------------------------
# Cortex Analyst semantic model — `lchl_exam_analytics`.
#
# Backs the analytical (text-to-SQL) leg of the GKTuition AI Tutor's
# retrieval layer, per ADR-004 Decision 2. Sits beside the three Cortex
# Search Services (TUTOR_SEARCH, SOLUTIONS_SEARCH, SUMMARY_SEARCH) and
# answers questions of shape "how often / how many / trends / since YYYY"
# that vector search cannot answer.
#
# Two tables, deliberately independent (no `relationships:` block):
#
#   exam_parts             — one row per exam question-part. The view
#                            CORTEX.EXAM_PARTS_FLAT does the strand-bucket
#                            derivation up front so the LLM doesn't have to
#                            invent regex. 1,213 rows after Agent 02's load.
#
#   exam_parts_by_tutorial — one row per (part × cited tutorial slug).
#                            CORTEX.EXAM_PARTS_BY_TUTORIAL exposes the
#                            tutorial-citation grain so questions of shape
#                            "how often is indices-logs-5 cited" don't
#                            require ARRAY_CONTAINS / FLATTEN gymnastics.
#                            1,000+ rows (187 parts have no tutorials,
#                            tracked in Agent 02's delivery note).
#
# Synonym policy: every dimension carries a `synonyms:` list that covers
#   • teacher vocabulary       — "the discriminant", "nature of roots", "AVM"
#   • student paraphrases      — "calculus 1", "imaginary numbers"
#   • formal exam-board wording — "Paper 1", "Section A", "main sitting"
#   • slug-form aliases        — "complex-numbers", "the-line"
# This is the single most load-bearing piece of the model — without it,
# Cortex Analyst fails on the same question phrased two ways.
#
# 10 verified queries are at the bottom; canonical_queries.md documents
# each one in plain English.
# ============================================================================

name: lchl_exam_analytics
description: |
  Analytical model over 11 years of Leaving Certificate Higher Level (LCHL)
  Mathematics state exams. Covers Paper 1 + Paper 2, main sittings 2015–2025
  plus deferred sittings 2022–2025 — 30 papers and ~1,213 individually
  tagged question-parts in total.

  Use this model to answer questions about:
    • exam-trend frequency      — "how often has X appeared on P1 since 2020?"
    • topic distribution        — "what's the strand mix on Paper 2 in 2024?"
    • marks allocation          — "average marks per integration part"
    • tutorial citation         — "how often is indices-logs-5 cited?"
    • cross-year trends         — "differentiation parts year-over-year"
    • format-shift comparisons  — "pre-2021 vs 2021-onwards part counts"
    • Section A vs Section B    — "where do algebra questions live?"
    • proof-question frequency  — "which years asked a Paper 1 proof?"

  Do NOT use this model for conceptual / pedagogical questions — those go
  through the Cortex Search Services (see routing_contract.md).

tables:

  # =========================================================================
  # TABLE 1 — exam_parts (one row per part)
  # =========================================================================
  - name: exam_parts
    description: |
      One row per LCHL exam question-part. Backs frequency, marks-allocation,
      and strand-mix queries.
    base_table:
      database: GKTUITION_TUTOR
      schema: CORTEX
      table: EXAM_PARTS_FLAT
    primary_key:
      columns: [part_id]

    # ─── Dimensions ──────────────────────────────────────────────────────
    dimensions:

      - name: part_id
        synonyms:
          - "question-part id"
          - "part identifier"
          - "exam part id"
        description: |
          Synthetic primary key, e.g. "2025_main_P1_Q1a", "2024_main_P2_Q5biii",
          "2015_main_P1_Q2" (no sub-part suffix when the question is unsplit).
        expr: part_id
        data_type: VARCHAR
        unique: true

      - name: paper
        synonyms:
          - "paper number"
          - "Paper 1"
          - "Paper 2"
          - "P1"
          - "P2"
          - "paper 1"
          - "paper 2"
          - "first paper"
          - "second paper"
        description: "Exam paper number — 1 (Algebra/Calculus heavy) or 2 (Geometry/Stats heavy)."
        expr: paper
        data_type: NUMBER

      - name: sitting
        synonyms:
          - "exam sitting"
          - "main sitting"
          - "deferred sitting"
          - "main exam"
          - "deferred exam"
          - "DF"
          - "df"
          - "deferred paper"
          - "main paper"
          - "supplementary exam"
        description: |
          Sitting identifier. 'main' = the June exam sitting; 'df' = the
          deferred sitting (held later in the year). Deferred papers only
          exist for 2022–2025.
        expr: sitting
        data_type: VARCHAR

      - name: question_number
        synonyms:
          - "question number"
          - "Q number"
          - "question"
          - "Q1"
          - "Q2"
          - "Q3"
          - "Q4"
          - "Q5"
          - "Q6"
          - "Q7"
          - "Q8"
          - "Q9"
          - "Q10"
        description: "Question number 1–10. Q1–Q6 = Section A. Q7–Q10 = Section B."
        expr: question_number
        data_type: NUMBER

      - name: sub_part
        synonyms:
          - "sub-part"
          - "subpart"
          - "part letter"
          - "(a)"
          - "(b)"
          - "(c)"
          - "(d)"
          - "(e)"
        description: |
          Sub-part identifier within a question — 'a', 'b(i)', 'b(ii)', 'c', etc.
          NULL when the question has no sub-parts (e.g. 2015 P1 Q2).
        expr: sub_part
        data_type: VARCHAR

      - name: section
        synonyms:
          - "exam section"
          - "Section A"
          - "Section B"
          - "section A"
          - "section B"
          - "concepts and skills"
          - "contexts and applications"
          - "first section"
          - "second section"
          - "short questions"
          - "long questions"
        description: |
          Exam section. 'A' = Section A (Concepts and Skills, Q1–Q6, 150 marks,
          students answer any 5). 'B' = Section B (Contexts and Applications,
          Q7–Q10, 150 marks, students answer any 3).
        expr: section
        data_type: VARCHAR

      - name: topic_strand
        synonyms:
          - "strand"
          - "topic"
          - "subject area"
          - "syllabus strand"
          - "topic area"
          - "category"
          # ── Paper 1 strands (Algebra) ─────────────────────────────────
          - "algebra"
          - "factor theorem"
          - "factorising"
          - "quadratics"
          - "discriminant"
          - "nature of roots"
          - "modulus"
          - "modulus equation"
          - "modulus inequality"
          - "surd"
          - "surd equation"
          - "polynomial long division"
          - "long division"
          - "manipulation of formula"
          - "change of subject"
          - "simultaneous equations"
          - "inequalities"
          - "rational inequalities"
          # ── Paper 1 strands (Differentiation) ─────────────────────────
          - "differentiation"
          - "calculus 1"
          - "derivatives"
          - "differentiating"
          - "derivative"
          - "first principles"
          - "turning point"
          - "maximum"
          - "minimum"
          - "stationary point"
          - "rate of change"
          - "rates of change"
          - "rate problem"
          - "chain rule"
          - "product rule"
          - "quotient rule"
          - "second derivative"
          - "concavity"
          - "point of inflection"
          - "tangent line"
          # ── Paper 1 strands (Integration) ─────────────────────────────
          - "integration"
          - "calculus 2"
          - "antiderivative"
          - "antiderivatives"
          - "integrating"
          - "integral"
          - "definite integral"
          - "indefinite integral"
          - "average value"
          - "area under curve"
          - "area under a curve"
          - "integration by parts"
          # ── Paper 1 strands (Sequences) ───────────────────────────────
          - "sequences"
          - "series"
          - "sequences and series"
          - "geometric sequences"
          - "geometric series"
          - "arithmetic sequences"
          - "arithmetic series"
          - "sum to infinity"
          - "geometric progression"
          - "arithmetic progression"
          - "GP"
          - "AP"
          - "common ratio"
          - "common difference"
          - "convergence"
          # ── Paper 1 strands (Indices and Logs) ────────────────────────
          - "indices"
