          # ── Paper 1 strands (Functions and Graphs) ────────────────────
          - "functions"
          - "graphs"
          - "functions and graphs"
          - "composite function"
          - "inverse function"
          - "injective"
          - "surjective"
          - "bijective"
          - "limits"
          - "limit at infinity"
          - "translation"
          - "domain"
          - "range"
          # ── Paper 1 strands (Financial Maths) ─────────────────────────
          - "financial maths"
          - "financial mathematics"
          - "compound interest"
          - "annuities"
          - "amortisation"
          - "amortization"
          - "mortgage"
          - "present value"
          - "future value"
          - "AER"
          # ── Paper 1 strands (Induction) ───────────────────────────────
          - "induction"
          - "proof by induction"
          - "mathematical induction"
          - "divisibility proof"
          # ── Paper 1 strands (Number Theory) ───────────────────────────
          - "number theory"
