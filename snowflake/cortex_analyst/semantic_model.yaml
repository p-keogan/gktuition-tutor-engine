        description: |
          Canonical strand bucket. Values: 'algebra', 'differentiation',
          'integration', 'sequences-series', 'indices-logs', 'complex-numbers',
          'functions-graphs', 'financial-maths', 'induction', 'number-theory',
          'paper-1-proofs', 'probability', 'statistics', 'trigonometry-1',
          'trigonometry-2', 'trigonometry-3', 'trigonometry-4', 'the-line',
